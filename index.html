<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qstellar AI | Security Analysis</title>

    <!-- 🎨 Styling & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- 📝 Markdown & Syntax Highlighting -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #e2e8f0;
            height: 100vh;
            overflow: hidden;
        }

        /* 🔮 Glassmorphism Utilities */
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-input {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.2);
            color: #f8fafc;
            transition: all 0.2s;
        }

        .glass-input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
            outline: none;
        }

        /* 📜 Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
        }

        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        /* 💬 Chat Bubbles */
        .msg-user {
            background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
            border-radius: 12px 12px 2px 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            word-break: break-word;
        }

        .msg-ai {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px 12px 12px 2px;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        /* 📝 Markdown Styles within AI Messages */
        .markdown-body {
            overflow-x: auto;
        }

        .markdown-body h1,
        .markdown-body h2,
        .markdown-body h3 {
            color: #f8fafc;
            font-weight: 600;
            margin-top: 1em;
            margin-bottom: 0.5em;
        }

        .markdown-body h3 {
            font-size: 1.1em;
            color: #93c5fd;
        }

        .markdown-body p {
            margin-bottom: 0.8em;
            line-height: 1.6;
        }

        .markdown-body ul,
        .markdown-body ol {
            margin-left: 1.5em;
            margin-bottom: 0.8em;
            list-style-type: disc;
        }

        .markdown-body strong {
            color: #60a5fa;
            font-weight: 600;
        }

        .markdown-body code {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 4px;
            border-radius: 4px;
            font-family: 'Menlo', 'Monaco', monospace;
            font-size: 0.9em;
            color: #e2e8f0;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .markdown-body pre {
            background: #0d1117;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 1em;
            max-width: 100%;
        }

        .markdown-body pre code {
            background: transparent;
            padding: 0;
            color: inherit;
            white-space: pre;
            word-break: normal;
        }

        .markdown-body blockquote {
            border-left: 4px solid #3b82f6;
            padding-left: 1em;
            color: #94a3b8;
            font-style: italic;
        }

        /* 🏃‍♂️ Animations */
        @keyframes pulse-glow {

            0%,
            100% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }
        }

        .thinking-dot {
            animation: pulse-glow 1.4s infinite ease-in-out;
        }

        .thinking-dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .thinking-dot:nth-child(2) {
            animation-delay: -0.16s;
        }
    </style>
</head>

<body class="flex h-screen w-full">

    <!-- 🎛️ SIDEBAR -->
    <aside class="w-80 glass-panel flex flex-col p-6 z-10 hidden md:flex shadow-2xl flex-shrink-0">
        <div class="mb-8 flex items-center space-x-3">
            <div
                class="w-10 h-10 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg flex-shrink-0">
                <i class="fa-solid fa-shield-halved text-white text-lg"></i>
            </div>
            <div class="min-w-0 flex-1">
                <h1 class="text-xl font-bold tracking-tight text-white truncate">Qstellar AI</h1>
                <p class="text-xs text-sky-400 font-medium truncate">Cyber Security Analyst</p>
            </div>
        </div>

        <!-- Session Config -->
        <div class="mb-6">
            <label class="text-xs uppercase font-semibold text-slate-400 mb-2 block tracking-wider">Session ID</label>
            <div class="relative">
                <i class="fa-solid fa-fingerprint absolute left-3 top-3 text-slate-500"></i>
                <input type="text" id="session-id" value="test-session-1"
                    class="glass-input w-full rounded-lg py-2 pl-9 pr-3 text-sm focus:ring-2 focus:ring-indigo-500 placeholder-slate-600"
                    placeholder="Enter Session ID">
            </div>
        </div>

        <!-- File Upload -->
        <div class="mb-auto min-w-0">
            <label class="text-xs uppercase font-semibold text-slate-400 mb-2 block tracking-wider">Knowledge
                Base</label>
            <div class="glass-input rounded-xl border-dashed border-2 border-slate-700 p-6 text-center hover:border-indigo-500 transition-colors cursor-pointer relative group"
                id="drop-zone">
                <input type="file" id="file-upload" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                    onchange="handleFileSelect()">
                <i
                    class="fa-solid fa-cloud-arrow-up text-3xl text-slate-500 mb-3 group-hover:text-indigo-400 transition-colors"></i>
                <!-- FIX: Added break-all and overflow-hidden to prevent overlap -->
                <p class="text-xs text-slate-300 font-medium break-all overflow-hidden px-2 line-clamp-3"
                    id="file-label">Click or Drag Report</p>
                <p class="text-[10px] text-slate-500 mt-2">PDF, DOCX, CSV</p>
            </div>

            <button onclick="uploadFile()" id="upload-btn"
                class="w-full mt-3 bg-indigo-600 hover:bg-indigo-500 text-white py-2 rounded-lg text-sm font-medium transition-all shadow-lg shadow-indigo-500/20 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                <i class="fa-solid fa-upload"></i> <span>Index Document</span>
            </button>

            <div id="upload-status" class="mt-3 text-xs text-center min-h-[1rem] break-words px-1"></div>
        </div>

        <!-- Footer -->
        <div class="mt-6 border-t border-slate-700 pt-4 text-center">
            <p class="text-xs text-slate-500">Engine: Qwen 2.5 (14b) • Local RAG</p>
        </div>
    </aside>

    <!-- 💬 MAIN CHAT AREA -->
    <main class="flex-1 flex flex-col relative bg-slate-900/50 min-w-0">
        <!-- Header (Mobile Only) -->
        <header class="md:hidden glass-panel p-4 flex justify-between items-center">
            <span class="font-bold text-lg">Qstellar AI</span>
            <button class="text-slate-400"><i class="fa-solid fa-bars"></i></button>
        </header>

        <!-- Chat History -->
        <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 scroll-smooth">
            <!-- Welcome Message -->
            <div class="flex flex-col items-center justify-center h-full text-center space-y-4 opacity-50"
                id="empty-state">
                <div class="w-16 h-16 rounded-full bg-slate-800 flex items-center justify-center">
                    <i class="fa-solid fa-robot text-2xl text-slate-500"></i>
                </div>
                <p class="text-slate-400 text-sm">Ready to analyze your security reports.<br>Upload a document or start
                    chatting.</p>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-4 md:p-6 pb-6">
            <div
                class="glass-panel rounded-2xl p-2 pl-4 pr-2 flex items-center gap-3 shadow-2xl max-w-4xl mx-auto ring-1 ring-white/10">
                <div class="flex-1">
                    <input type="text" id="user-input"
                        class="w-full bg-transparent border-none focus:ring-0 text-slate-200 placeholder-slate-500 py-3"
                        placeholder="Ask about vulnerabilities, risk levels, or report comparisons..."
                        autocomplete="off" onkeydown="handleEnter(event)">
                </div>
                <button onclick="sendMessage()" id="send-btn"
                    class="w-10 h-10 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white flex items-center justify-center transition-all shadow-lg disabled:bg-slate-700 flex-shrink-0">
                    <i class="fa-solid fa-paper-plane text-sm"></i>
                </button>
            </div>
            <p class="text-center text-xs text-slate-600 mt-2">AI can make mistakes. Verify critical findings.</p>
        </div>
    </main>

    <script>
        const API_BASE = 'http://localhost:5555/api';
        let clientChatHistory = "";

        // 🟢 INIT
        document.addEventListener('DOMContentLoaded', () => {
            marked.setOptions({
                highlight: function (code, lang) {
                    const language = highlight.getLanguage(lang) ? lang : 'plaintext';
                    return hljs.highlight(code, { language }).value;
                },
                langPrefix: 'hljs language-'
            });
        });

        // 📁 FILE HANDLING
        function handleFileSelect() {
            const input = document.getElementById('file-upload');
            const label = document.getElementById('file-label');
            if (input.files && input.files[0]) {
                label.textContent = input.files[0].name;
                label.classList.add('text-indigo-300');
            }
        }

        async function uploadFile() {
            const input = document.getElementById('file-upload');
            const sessionId = document.getElementById('session-id').value;
            const btn = document.getElementById('upload-btn');
            const status = document.getElementById('upload-status');

            if (!input.files[0]) {
                status.innerHTML = '<span class="text-red-400">Please select a file</span>';
                return;
            }

            const formData = new FormData();
            formData.append('file', input.files[0]);
            formData.append('session_id', sessionId);

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> <span>Processing...</span>';
            status.textContent = 'Indexing document into Knowledge Graph...';
            status.className = 'mt-3 text-xs text-center text-blue-400 animate-pulse';

            try {
                const res = await fetch(`${API_BASE}/upload`, { method: 'POST', body: formData });
                const data = await res.json();

                if (res.ok && data.status === 'success') {
                    status.innerHTML = '<span class="text-emerald-400 font-medium"><i class="fa-solid fa-check"></i> Indexed Successfully</span>';
                    addSystemMessage(`📄 Document <strong>${input.files[0].name}</strong> added to knowledge base.`);
                } else {
                    status.innerHTML = `<span class="text-red-400">Error: ${data.message || 'Upload failed'}</span>`;
                }
            } catch (e) {
                status.innerHTML = `<span class="text-red-400">Network Error</span>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-upload"></i> <span>Index Document</span>';
            }
        }

        // 💬 CHAT LOGIC
        function handleEnter(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function createBubble(role, content) {
            const container = document.getElementById('chat-container');
            const emptyState = document.getElementById('empty-state');
            if (emptyState) emptyState.remove();

            const wrapper = document.createElement('div');
            wrapper.className = `flex w-full ${role === 'User' ? 'justify-end' : 'justify-start'}`;

            const bubble = document.createElement('div');
            bubble.className = `max-w-[85%] md:max-w-[75%] p-4 text-sm md:text-base shadow-md ${role === 'User' ? 'msg-user text-white font-medium' : 'msg-ai text-slate-200 markdown-body'}`;

            if (role === 'AI') {
                bubble.innerHTML = marked.parse(content);
            } else {
                bubble.textContent = content;
            }

            wrapper.appendChild(bubble);
            container.appendChild(wrapper);
            container.scrollTop = container.scrollHeight;
            return bubble;
        }

        function addSystemMessage(html) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = 'w-full text-center my-4';
            div.innerHTML = `<span class="bg-slate-800/80 text-slate-400 text-xs py-1 px-3 rounded-full border border-slate-700">${html}</span>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const btn = document.getElementById('send-btn');
            const sessionId = document.getElementById('session-id').value;
            const text = input.value.trim();

            if (!text) return;

            input.value = '';
            btn.disabled = true;

            // 1. Add User Message
            createBubble('User', text);

            // 2. Add Thinking Indicator
            const thinkingWrapper = document.createElement('div');
            thinkingWrapper.className = 'flex w-full justify-start';
            thinkingWrapper.id = 'thinking-indicator';
            thinkingWrapper.innerHTML = `
                <div class="msg-ai p-4 flex gap-1 items-center">
                    <div class="w-2 h-2 bg-indigo-400 rounded-full thinking-dot"></div>
                    <div class="w-2 h-2 bg-indigo-400 rounded-full thinking-dot"></div>
                    <div class="w-2 h-2 bg-indigo-400 rounded-full thinking-dot"></div>
                </div>`;
            document.getElementById('chat-container').appendChild(thinkingWrapper);
            document.getElementById('chat-container').scrollTop = document.getElementById('chat-container').scrollHeight;

            try {
                const res = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_input: text,
                        session_id: sessionId,
                        chat_history: clientChatHistory
                    })
                });

                const data = await res.json();

                // Remove thinking
                document.getElementById('thinking-indicator').remove();

                if (res.ok) {
                    createBubble('AI', data.response);
                    // Update client-side history string (simplistic)
                    clientChatHistory += `User: ${text}\nAI: ${data.response}\n`;
                } else {
                    createBubble('AI', `⚠️ **System Error**: ${data.detail || 'Could not fetch response.'}`);
                }

            } catch (e) {
                document.getElementById('thinking-indicator')?.remove();
                createBubble('AI', `🔴 **Network Error**: Is the backend running? (${e.message})`);
            } finally {
                btn.disabled = false;
                // Keep focus on input for rapid chatting
                setTimeout(() => input.focus(), 50);
            }
        }
    </script>
</body>

</html>
